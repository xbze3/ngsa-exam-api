services:
    api:
        build: .
        container_name: ngsa-api
        ports:
            - "8080:8080"
        environment:
            PORT: 8080
            MONGODB_URI: mongodb://mongo:27017/ngsa-db
        depends_on:
            - mongo
        restart: unless-stopped

    mongo:
        image: mongo:7
        container_name: ngsa-mongo
        command: ["mongod", "--quiet"]
        ports:
            - "27017:27017"
        volumes:
            - mongo_data:/data/db
            - ./data:/data/import
            - ./mongo-init:/docker-entrypoint-initdb.d
        restart: unless-stopped

volumes:
    mongo_data:
